<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Language Translation Tool</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

<h1>🌍 Language Translator</h1>

<textarea id="inputText" placeholder="Enter text here..."></textarea>

<p>Characters: <span id="count">0</span></p>

<div class="language-section">
<select id="sourceLang">
<option value="en">English</option>
<option value="te">Telugu</option>
<option value="hi">Hindi</option>
<option value="ta">Tamil</option>
<option value="kn">Kannada</option>
<option value="ml">Malayalam</option>
<option value="mr">Marathi</option>
<option value="gu">Gujarati</option>
<option value="bn">Bengali</option>
<option value="pa">Punjabi</option>
<option value="ur">Urdu</option>
<option value="fr">French</option>
<option value="de">German</option>
<option value="es">Spanish</option>
<option value="it">Italian</option>
<option value="ja">Japanese</option>
<option value="ko">Korean</option>
<option value="zh-CN">Chinese</option>
<option value="ru">Russian</option>
<option value="ar">Arabic</option>
</select>

<button onclick="swapLanguages()">⇄</button>

<select id="targetLang">
<option value="te">Telugu</option>
<option value="en">English</option>
<option value="hi">Hindi</option>
<option value="ta">Tamil</option>
<option value="kn">Kannada</option>
<option value="ml">Malayalam</option>
<option value="mr">Marathi</option>
<option value="gu">Gujarati</option>
<option value="bn">Bengali</option>
<option value="pa">Punjabi</option>
<option value="ur">Urdu</option>
<option value="fr">French</option>
<option value="de">German</option>
<option value="es">Spanish</option>
<option value="it">Italian</option>
<option value="ja">Japanese</option>
<option value="ko">Korean</option>
<option value="zh-CN">Chinese</option>
<option value="ru">Russian</option>
<option value="ar">Arabic</option>
</select>
</div>

<button onclick="translateText()">Translate</button>

<textarea id="outputText" readonly placeholder="Translated text will appear here"></textarea>

<div class="btn-group">
<button onclick="copyText()">Copy</button>
<button onclick="speakText()">Speak</button>
<button onclick="startVoice()">🎤 Voice Input</button>
<button onclick="downloadText()">Download</button>
<button onclick="clearText()">Clear</button>
<button onclick="darkMode()">Dark Mode</button>
</div>

<h3>Translation History</h3>
<ul id="history"></ul>

</div>

<script src="script.js"></script>
</body>
</html>
